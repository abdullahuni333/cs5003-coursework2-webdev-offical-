<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Registration - PC Builder</title>
    <h:outputStylesheet name="css/style.css"/>
</h:head>

<h:body>

    <div class="header">
        <h1>PC Builder</h1>
        <p>Create an account to save your PC builds</p>
    </div>

    <div class="nav">
        <h:link value="Home" outcome="/index.xhtml" />
        <h:outputText value=" | " />
        <h:link value="Login" outcome="/Login.xhtml" />
        <h:outputText value=" | " />
        <h:link value="Register" outcome="/registration.xhtml" />
    </div>

    <div class="content">
        <h2>Create Account</h2>

        <h:form>
            <p>
                <h:outputLabel for="name" value="Full Name: " />
                <h:inputText id="name" value="#{registrationBean.name}" required="true"
                             requiredMessage="Name is required" />
            </p>

            <p>
                <h:outputLabel for="email" value="Email: " />
                <h:inputText id="email" value="#{registrationBean.email}" required="true"
                             requiredMessage="Email is required" />
            </p>

            <p>
                <h:outputLabel for="password" value="Password: " />
                <h:inputSecret id="password" value="#{registrationBean.password}" required="true"
                               requiredMessage="Password is required" />
            </p>

            <p>
                <h:commandButton value="Create Account" action="#{registrationBean.register}" />
            </p>

            <p>
                <h:messages style="color:red;" />
            </p>
        </h:form>
    </div>

    <div class="footer">
        <p>University Project - PC Builder Website</p>
    </div>

</h:body>
</html>
