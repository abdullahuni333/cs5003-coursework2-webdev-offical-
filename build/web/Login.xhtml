<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="./Template.xhtml">

        <ui:define name="title">
            Login - PC Builder
        </ui:define>

        <ui:define name="content">

            <h2>Login</h2>

            <h:form>
                <p>
                    <h:outputLabel for="email" value="Email: " />
                    <h:inputText id="email" value="#{loginBean.email}" required="true"
                                 requiredMessage="Email is required" /> <!-- email field cannot be left empty/input box for email if empty -->
                </p>

                <p>
                    <h:outputLabel for="password" value="Password: " />
                    <h:inputSecret id="password" value="#{loginBean.password}" required="true" 
                                   requiredMessage="Password is required" /> <!-- no password input if missing -->
                </p>

                <p>
                    <h:commandButton value="Login" action="#{loginBean.login}" /> <!-- calls loginBean to check user details -->
                </p>

                <p>
                    <h:link value="Don't have an account? Register here"
                            outcome="/registration.xhtml" /> <!-- link to registration page -->
                </p>

                <p>
                    <h:messages style="color:red;" /> <!-- displays validation or login error messages in red -->
                </p>
            </h:form>

        </ui:define>

    </ui:composition>

</html>
