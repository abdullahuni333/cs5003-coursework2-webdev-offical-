<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

    <ui:composition template="./Template.xhtml">

        <ui:define name="title">
            PC Builder - Home
        </ui:define>

        <ui:define name="content">

            <!-- account buttons (top right when logged in) -->
            <h:panelGroup rendered="#{loginBean.loggedIn}" layout="block" styleClass="accountActions">

                <h:form style="display:inline;"> <!-- form needed for logout button -->
                    <h:commandButton value="Logout"
                                     action="#{loginBean.logout}"
                                     styleClass="buttonLink" /> <!-- logs user out -->
                </h:form>

                <h:form style="display:inline;"> <!-- form needed for delete account button -->
                    <h:commandButton value="Delete Account"
                                     action="#{loginBean.deleteAccount}"
                                     onclick="return confirm('Are you sure you want to delete your account?');"
                                     styleClass="deleteButton" /> <!-- deletes current logged in account -->
                </h:form>

            </h:panelGroup>

            <h2>Welcome to PC Builder</h2> <!-- main heading for homepage -->

            <p>
                This website helps users choose computer parts and check total costs. <!-- short description of website  -->
            </p>

            <h3>Purpose:</h3> <!-- heading 2 -->
            <ul>
                <li>Browse computer parts</li> 
                <li>Create and save a custom PC build</li> 
                <li>View your build summary</li> 
            </ul>

            <br/>

            <h:link value="Start Building Your PC"
                    outcome="/build.xhtml"
                    styleClass="buttonLink" /> <!-- link to build pc page -->

        </ui:define>

    </ui:composition>

</html>
