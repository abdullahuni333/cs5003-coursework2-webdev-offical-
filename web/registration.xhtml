<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<!-- namespaces: ui = templates, h = JSF components, f = JSF core features -->
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <!-- this page uses Template.xhtml as its layout -->
    <ui:composition template="./Template.xhtml">

        <!-- sets the page title in the template -->
        <ui:define name="title">
            Registration - PC Builder
        </ui:define>

        <!-- everything inside here is inserted into the template's content section -->
        <ui:define name="content">
            <h2>Create Account</h2>

            <!-- JSF form used to send data to the backend bean -->
            <h:form>

                <!-- name input -->
                <p>
                    <h:outputLabel for="name" value="Full Name: " />
                    <!-- links to registrationBean.name -->
                    <h:inputText id="name" value="#{registrationBean.name}" required="true"
                                 requiredMessage="Name is required" />
                </p>

                <!-- email input -->
                <p>
                    <h:outputLabel for="email" value="Email: " />
                    <!-- links to registrationBean.email -->
                    <h:inputText id="email" value="#{registrationBean.email}" required="true"
                                 requiredMessage="Email is required" />
                </p>
                <!-- country input -->
                <p>
                    <h:outputLabel for="country" value="country: " />
                    <!-- links to registrationBean.country -->
                    <h:inputText id="country" value="#{registrationBean.country}" required="true"
                                 requiredMessage="country is required" />
                </p>
                <!-- city input -->
                <p>
                    <h:outputLabel for="city" value="city: " />
                    <!-- links to registrationBean.city -->
                    <h:inputText id="city" value="#{registrationBean.city}" required="true"
                                 requiredMessage="city is required" />
                </p>
                <!-- street input -->
                <p>
                    <h:outputLabel for="street" value="street: " />
                    <!-- links to registrationBean.street -->
                    <h:inputText id="street" value="#{registrationBean.street}" required="true"
                                 requiredMessage="street is required" />
                </p>

                <!-- password input (hidden text) -->
                <p>
                    <h:outputLabel for="password" value="Password: " />
                    <h:inputSecret id="password" value="#{registrationBean.password}" required="true"
                                   requiredMessage="Password is required" />
                </p>

                <!-- button calls the gosubmit() method in the bean -->
                <p>
                    <h:commandButton value="Create Account" action="#{registrationBean.gosubmit}" />
                </p>

                <!-- shows validation errors/messages -->
                <p>
                    <h:messages style="color:red;" />
                </p>

            </h:form>
        </ui:define>

    </ui:composition>

</html>
