<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:composition template="./Template.xhtml">

        <ui:define name="title">
            Build PC - PC Builder
        </ui:define>

        <ui:define name="content">
            <h2>Build Your PC</h2>

            <h:form>

                <p>
                    <h:outputLabel for="cpu" value="CPU: " />
                    <h:selectOneMenu id="cpu" value="#{buildBean.cpu}">
                        <f:selectItem itemLabel="Select CPU" itemValue="" /> <!-- default no selection option -->
                        <f:selectItem itemLabel="AMD Ryzen 5 5600X - £180" itemValue="Ryzen 5 5600X" />
                        <f:selectItem itemLabel="Intel Core i5-12400F - £170" itemValue="Core i5-12400F" />
                        <f:ajax render="total" /> <!-- call for ajax to reload total without refresh-->
                    </h:selectOneMenu>
                </p>

                <p>
                    <h:outputLabel for="gpu" value="GPU: " />
                    <h:selectOneMenu id="gpu" value="#{buildBean.gpu}"> <!-- dropdown for gpu selection -->
                        <f:selectItem itemLabel="Select GPU" itemValue="" /> <!-- default no selection option -->
                        <f:selectItem itemLabel="NVIDIA RTX 4060 - £290" itemValue="RTX 4060" />
                        <f:selectItem itemLabel="AMD Radeon RX 7600 - £260" itemValue="RX 7600" />
                        <f:ajax render="total" /> <!-- call for ajax -->
                    </h:selectOneMenu>
                </p>

                <p>
                    <h:outputLabel for="ram" value="RAM: " />  
                    <h:selectOneMenu id="ram" value="#{buildBean.ram}"> <!-- dropdown for ram selection -->
                        <f:selectItem itemLabel="Select RAM" itemValue="" /> <!-- default no selection option -->
                        <f:selectItem itemLabel="16GB DDR4 - £45" itemValue="16GB DDR4" />
                        <f:selectItem itemLabel="32GB DDR4 - £80" itemValue="32GB DDR4" />
                        <f:ajax render="total" />  <!-- call for ajax -->
                    </h:selectOneMenu>
                </p>

                <h3>
                    Total Price: £
                    <h:outputText id="total" value="#{buildBean.totalPrice}" />  <!-- displays the total price from buildBean  -->
                </h3>

                <p>
                    <h:commandButton value="Save Build" action="#{buildBean.saveBuild(loginBean.email)}" />
                </p>

            </h:form>
        </ui:define>

    </ui:composition>

</html>
