<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

    <h:head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" /> <!-- sets character encoding -->
        <title><ui:insert name="title">PC Builder</ui:insert></title> <!-- inserts page title from other pages -->
        <h:outputStylesheet name="css/style.css"/> <!-- links external css file -->
    </h:head>

    <h:body>

        <div class="header">
            <h1>PC Builder</h1> <!-- main website header -->
            <p>Create your custom PC build</p> <!-- description -->
        </div>

        <div class="nav">
            <h:link value="Home" outcome="/index.xhtml" /> <!-- link to home page -->
            <h:outputText value=" | " />

            <h:panelGroup rendered="#{!loginBean.loggedIn}"> <!-- only show when user is not logged in -->
                <h:link value="Login" outcome="/Login.xhtml" /> <!-- link to login page -->
                <h:outputText value=" | " />
                <h:link value="Register" outcome="/registration.xhtml" /> <!-- link to registration page -->
                <h:outputText value=" | " />
            </h:panelGroup>

            <h:panelGroup rendered="#{loginBean.loggedIn}"> <!-- only show when user is logged in -->
                <h:outputText value="Welcome, #{loginBean.username}" styleClass="navUser" /> <!-- shows logged in username -->
                <h:outputText value=" | " />
            </h:panelGroup>

            <h:link value="Build PC" outcome="/build.xhtml" /> <!-- link to build pc page -->
            <h:outputText value=" | " />
            <h:link value="Saved Builds" outcome="/Savedbuilds.xhtml" /> <!-- link to saved builds page -->
        </div>

        <div class="content">
            <ui:insert name="content" /> <!-- inserts page specific content -->
        </div>

        <div class="footer">
            <p>University Project - PC Builder Website</p> <!-- footer -->
        </div>

    </h:body>

</html>
